name: Build Check

on:
  pull_request:
    branches: [main]

defaults:
  run:
    working-directory: sales-portal-robot-tests

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Lint Python — ruff
        run: ruff check libraries/ variables/ data/ scripts/

      - name: Type-check Python — mypy
        run: mypy libraries/ variables/ data/

      - name: Lint Robot files — robocop
        run: python -m robocop check resources/ tests/
